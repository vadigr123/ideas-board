<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Ideas Board</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f1a;--panel:#13162b;--p2:#1a1e35;--ac:#0f3460;--red:#e94560;
  --tx:#c8d0e7;--txd:#5a6490;--txb:#eef2ff;--br:#1e2544;--brb:#2a3260;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:var(--sans);color:var(--tx);touch-action:none}

/* BG GRID */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,#1e2544 1px,transparent 1px);
  background-size:32px 32px;will-change:background-position,background-size}

/* VIEWPORT */
#vp{position:fixed;inset:0;z-index:1;overflow:hidden;cursor:grab;-webkit-tap-highlight-color:transparent}
#vp.grabbing{cursor:grabbing}
#world{position:absolute;top:0;left:0;width:0;height:0;transform-origin:0 0;will-change:transform;contain:layout style}

/* CATEGORY NODE */
.cat-node{position:absolute;min-width:290px;max-width:350px;border-radius:14px;
  border:1px solid var(--brb);background:var(--panel);
  box-shadow:0 4px 24px rgba(0,0,0,.5);overflow:hidden;
  transition:border-color .2s,box-shadow .2s;contain:layout style paint;
  animation:nIn .35s cubic-bezier(.16,1,.3,1) backwards}
.cat-node:hover{border-color:var(--red);box-shadow:0 4px 28px rgba(0,0,0,.6),0 0 16px rgba(233,69,96,.25)}
@keyframes nIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:none}}
.nhdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--p2);border-bottom:1px solid var(--br)}
.ndots{display:flex;gap:5px;flex-shrink:0}
.ndots span{width:8px;height:8px;border-radius:50%}
.dr{background:#e94560}.dy{background:#f4c842}.dg{background:#3cc974}
.ntitle{font-size:13px;font-weight:600;color:var(--txb);font-family:var(--mono);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nstatus{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--red);
  color:#fff;white-space:nowrap;flex-shrink:0;font-family:var(--mono)}
.nideas{padding:10px;display:flex;flex-direction:column;gap:7px}
.icard{background:var(--p2);border:1px solid var(--br);border-radius:10px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .15s,background .15s;contain:layout style}
.icard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--red);opacity:0;transition:opacity .15s;border-radius:3px 0 0 3px}
.icard:hover{border-color:var(--brb);background:#1d2240}
.icard:hover::before{opacity:1}
.icollage{width:100%;overflow:hidden;max-height:110px;display:flex;gap:2px}
.icollage img{flex:1;object-fit:cover;min-width:0;height:110px;display:block;
  transition:transform .3s;will-change:transform}
.icard:hover .icollage img{transform:scale(1.04)}
.iinfo{padding:9px 12px 7px}
.ititle{font-size:12px;font-weight:500;color:var(--txb);font-family:var(--mono);margin-bottom:3px}
.idesc{font-size:11px;color:var(--txd);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.itags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.itag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:8px;
  background:var(--ac);color:#7a9fd4;font-family:var(--mono);text-transform:uppercase}
.ilinks{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 7px}
.ilp{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:var(--mono);
  padding:2px 8px;border-radius:16px;border:1px solid var(--brb);color:var(--txd);
  background:var(--panel);text-decoration:none;transition:all .15s;white-space:nowrap}
.ilp:hover{border-color:var(--red);color:var(--red)}
/* Reference buttons */
.refs-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 9px}
.ref-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:9px;
  font-family:var(--mono);font-size:11px;font-weight:600;text-decoration:none;
  border:2px solid transparent;transition:all .18s;white-space:nowrap}
.ref-btn:hover{transform:translateY(-2px);filter:brightness(1.2)}
.ref-btn.red{background:rgba(233,69,96,.15);color:#e94560;border-color:rgba(233,69,96,.4)}
.ref-btn.blue{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.4)}
.ref-btn.green{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.4)}
.ref-btn.yellow{background:rgba(234,179,8,.15);color:#facc15;border-color:rgba(234,179,8,.4)}
.ref-btn.purple{background:rgba(168,85,247,.15);color:#c084fc;border-color:rgba(168,85,247,.4)}
.ref-btn.gray{background:rgba(148,163,184,.1);color:#94a3b8;border-color:rgba(148,163,184,.3)}
.nfoot{padding:5px 14px;border-top:1px solid var(--br);font-size:10px;
  color:var(--txd);font-family:var(--mono);display:flex;justify-content:space-between}

/* STICKY NOTE */
.sticky-note{position:absolute;border-radius:10px;padding:13px 15px;
  box-shadow:0 4px 18px rgba(0,0,0,.4);min-width:180px;max-width:260px;
  contain:layout style;animation:nIn .35s cubic-bezier(.16,1,.3,1) backwards}
.sticky-note.yellow{background:#f5e642;color:#3a3200}
.sticky-note.blue{background:#3b82f6;color:#dbeafe}
.sticky-note.pink{background:#ec4899;color:#ffe4f3}
.sticky-note.green{background:#22c55e;color:#002a10}
.sticky-note.purple{background:#a855f7;color:#f5e8ff}
.sticky-note.orange{background:#f97316;color:#3a1200}
.sntitle{font-size:12px;font-weight:600;font-family:var(--mono);margin-bottom:5px;opacity:.75}
.sncontent{font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:12px;
  padding:9px 18px;background:rgba(13,15,26,.88);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--br);contain:layout style paint}
.hlogo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--red);
  letter-spacing:.08em;display:flex;align-items:center;gap:6px}
.hpulse{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hsep{width:1px;height:18px;background:var(--brb)}
.hsp{flex:1}

/* CONTROLS */
#controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:5px;background:rgba(13,15,26,.9);backdrop-filter:blur(14px);
  border:1px solid var(--brb);border-radius:40px;padding:5px 8px;contain:layout style paint}
.cbtn{background:var(--p2);border:1px solid var(--br);border-radius:20px;
  color:var(--tx);font-family:var(--mono);font-size:11px;padding:5px 13px;
  cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.cbtn:hover{background:var(--ac);border-color:var(--red);color:#fff}

/* SUBMIT */
#submit-btn{position:fixed;bottom:22px;right:22px;z-index:100;
  background:var(--red);border:none;border-radius:50px;color:#fff;
  font-family:var(--mono);font-size:12px;font-weight:600;
  padding:10px 20px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 20px rgba(233,69,96,.5);contain:layout style}
#submit-btn:hover{background:#ff2244;transform:translateY(-2px)}

/* MINIMAP */
#minimap{position:fixed;bottom:70px;right:90px;z-index:100;width:136px;height:92px;
  background:rgba(13,15,26,.92);border:1px solid var(--brb);border-radius:10px;overflow:hidden;
  contain:layout style paint}
#mmlabel{position:absolute;top:5px;left:8px;font-size:9px;color:var(--txd);
  font-family:var(--mono);text-transform:uppercase;pointer-events:none}

/* IDEA MODAL */
#modal-bg{position:fixed;inset:0;z-index:200;background:rgba(5,7,15,.78);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .18s}
#modal-bg.open{opacity:1;pointer-events:all}
#modal{background:var(--panel);border:1px solid var(--brb);border-radius:18px;
  max-width:520px;width:92%;max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
  transform:translateY(20px) scale(.97);transition:transform .2s cubic-bezier(.16,1,.3,1);position:relative}
#modal::-webkit-scrollbar{width:4px}
#modal::-webkit-scrollbar-thumb{background:var(--brb);border-radius:2px}
#modal-bg.open #modal{transform:none}
#mcollage{width:100%;display:flex;gap:2px;border-radius:18px 18px 0 0;overflow:hidden;max-height:230px}
#mcollage img{flex:1;object-fit:cover;min-width:0;display:block}
#mcollage.c1 img{height:230px}
#mcollage.c2 img{height:230px}
#mcollage.c3 img:first-child{flex:2;height:230px}
#mcollage.c3 .cst{display:flex;flex-direction:column;gap:2px;flex:1}
#mcollage.c3 .cst img{flex:1;min-height:0;height:calc(115px - 1px)}
#mbody{padding:22px 26px}
.mchip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;
  font-family:var(--mono);color:var(--red);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}
.mchip::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block}
.mttl{font-size:21px;font-weight:600;color:var(--txb);margin-bottom:9px;line-height:1.25}
.mdsc{font-size:13px;color:var(--tx);line-height:1.7;margin-bottom:14px}
.mtags2{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.mpill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px;
  background:var(--ac);color:#7a9fd4;font-family:var(--mono);text-transform:uppercase}
.mlt{font-size:10px;font-family:var(--mono);color:var(--txd);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:7px}
.mlinks{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.mlb{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;
  border:1px solid var(--brb);background:var(--p2);color:var(--txb);
  font-family:var(--mono);font-size:12px;text-decoration:none;transition:all .15s;font-weight:500}
.mlb:hover{border-color:var(--red);color:var(--red);transform:translateY(-1px)}
.mref-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.mref-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:11px;
  font-family:var(--mono);font-size:12px;font-weight:600;text-decoration:none;
  border:2px solid transparent;transition:all .2s}
.mref-btn:hover{transform:translateY(-2px);filter:brightness(1.2)}
.mref-btn.red{background:rgba(233,69,96,.15);color:#e94560;border-color:rgba(233,69,96,.4)}
.mref-btn.blue{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.4)}
.mref-btn.green{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.4)}
.mref-btn.yellow{background:rgba(234,179,8,.15);color:#facc15;border-color:rgba(234,179,8,.4)}
.mref-btn.purple{background:rgba(168,85,247,.15);color:#c084fc;border-color:rgba(168,85,247,.4)}
.mref-btn.gray{background:rgba(148,163,184,.1);color:#94a3b8;border-color:rgba(148,163,184,.3)}
.mcat{font-size:11px;color:var(--txd);font-family:var(--mono);
  border-top:1px solid var(--br);padding-top:12px}
.mclose{position:absolute;top:12px;right:12px;z-index:10;background:rgba(13,15,26,.7);
  border:1px solid var(--br);border-radius:7px;color:var(--txd);width:30px;height:30px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;
  transition:all .15s;backdrop-filter:blur(4px)}
.mclose:hover{color:var(--red);border-color:var(--red)}

/* SUBMIT MODAL */
#sub-bg{position:fixed;inset:0;z-index:300;background:rgba(5,7,15,.82);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .18s}
#sub-bg.open{opacity:1;pointer-events:all}
#sub-modal{background:var(--panel);border:1px solid var(--brb);border-radius:18px;
  max-width:460px;width:92%;padding:30px;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
  transform:translateY(20px) scale(.97);transition:transform .2s cubic-bezier(.16,1,.3,1);position:relative}
#sub-bg.open #sub-modal{transform:none}
.sub-head{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--txb);margin-bottom:5px}
.sub-sub{font-size:12px;color:var(--txd);margin-bottom:22px;line-height:1.55}
.sf{margin-bottom:12px}
.sl{display:block;font-size:10px;color:var(--txd);font-family:var(--mono);margin-bottom:4px;letter-spacing:.04em}
.si{width:100%;background:var(--p2);border:1px solid var(--brb);border-radius:8px;
  color:var(--txb);font-family:var(--mono);font-size:12px;padding:8px 11px;outline:none;
  transition:border-color .15s}
.si:focus{border-color:var(--red)}
textarea.si{resize:vertical;min-height:80px}
select.si{cursor:pointer}
.sbtn{width:100%;background:var(--red);border:none;border-radius:9px;color:#fff;
  font-family:var(--mono);font-size:12px;font-weight:600;padding:11px;cursor:pointer;
  transition:background .2s;margin-top:4px}
.sbtn:hover{background:#ff2244}
.sbtn:disabled{opacity:.5;cursor:not-allowed}
.snote{font-size:10px;color:var(--txd);font-family:var(--mono);margin-top:8px;line-height:1.6;text-align:center}
.sub-ok{display:none;text-align:center;padding:16px 0}
.sub-ok-ico{font-size:36px;margin-bottom:10px}
.sub-ok-txt{font-family:var(--mono);font-size:13px;color:var(--txb)}
.sub-cl{position:absolute;top:12px;right:12px;background:var(--p2);border:1px solid var(--brb);
  border-radius:7px;color:var(--txd);width:28px;height:28px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.sub-cl:hover{color:var(--red);border-color:var(--red)}

/* LOADING */
#loading{position:fixed;inset:0;z-index:400;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .4s}
#loading.done{opacity:0;pointer-events:none}
.llogo{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--red);letter-spacing:.12em}
.lbar{width:160px;height:2px;background:var(--br);border-radius:2px;overflow:hidden}
.lfill{height:100%;background:var(--red);animation:lb 1s ease-out forwards}
@keyframes lb{from{width:0}to{width:100%}}
.ltxt{font-size:11px;color:var(--txd);font-family:var(--mono);text-align:center}
</style>
</head>
<body>
<div id="loading">
  <div class="llogo">IDEAS BOARD</div>
  <div class="lbar"><div class="lfill"></div></div>
  <div class="ltxt" id="ltxt">Loading...</div>
</div>

<div id="bg"></div>
<div id="hud">
  <div class="hlogo"><span class="hpulse"></span>IDEAS BOARD</div>
  <div class="hsep"></div>
  <span style="font-size:11px;color:var(--txd);font-family:var(--mono)" id="hsub">A space for creative thoughts</span>
  <div class="hsp"></div>
  <span style="font-size:11px;color:var(--txd);font-family:var(--mono)" id="hcount"></span>
  <div class="hsep"></div>
  <span style="font-size:11px;color:var(--txd);font-family:var(--mono);min-width:44px;text-align:right" id="hzoom">100%</span>
</div>
<div id="vp"><div id="world"></div></div>
<div id="controls">
  <button class="cbtn" onclick="resetView()">Reset</button>
  <button class="cbtn" onclick="fitAll()">Fit all</button>
  <button class="cbtn" onclick="zoomIn()">+</button>
  <button class="cbtn" onclick="zoomOut()">-</button>
</div>
<div id="minimap"><div id="mmlabel">MAP</div><canvas id="mmcvs" width="136" height="92"></canvas></div>
<button id="submit-btn" onclick="openSub()">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Submit Idea
</button>

<div id="modal-bg" onclick="closeMod(event)">
  <div id="modal">
    <button class="mclose" onclick="closeMod()">x</button>
    <div id="mcollage"></div>
    <div id="mbody">
      <div class="mchip" id="m-st"></div>
      <div class="mttl" id="m-ti"></div>
      <div class="mdsc" id="m-de"></div>
      <div class="mtags2" id="m-ta"></div>
      <div id="m-lw" style="display:none"><div class="mlt">Links</div><div class="mlinks" id="m-li"></div></div>
      <div id="m-rw" style="display:none"><div class="mlt">References</div><div class="mref-row" id="m-ri"></div></div>
      <div class="mcat" id="m-ca"></div>
    </div>
  </div>
</div>

<div id="sub-bg" onclick="closeSub(event)">
  <div id="sub-modal">
    <button class="sub-cl" onclick="closeSub()">x</button>
    <div id="sub-wrap">
      <div class="sub-head">Submit an Idea</div>
      <div class="sub-sub">Have a suggestion? Your idea will be reviewed by the team.</div>
      <div class="sf"><label class="sl">Category</label><select class="si" id="sub-cat"></select></div>
      <div class="sf"><label class="sl">Idea title</label><input type="text" class="si" id="sub-title" placeholder="Clear, descriptive name"></div>
      <div class="sf"><label class="sl">Description</label><textarea class="si" id="sub-desc" placeholder="Tell us more..."></textarea></div>
      <div class="sf"><label class="sl">Your name / contact (optional)</label><input type="text" class="si" id="sub-contact" placeholder="@username or email"></div>
      <button class="sbtn" id="sub-btn" onclick="submitIdea()">Submit Idea</button>
      <div class="snote" id="sub-note">Clicking Submit opens GitHub to complete your submission.</div>
    </div>
    <div class="sub-ok" id="sub-ok">
      <div class="sub-ok-ico">&#8599;</div>
      <div class="sub-ok-txt">GitHub opened in a new tab.<br><span style="font-size:11px;opacity:.6">Sign in and click Submit new issue.</span></div>
    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────
var V={tx:0,ty:0,sc:1};            // viewport transform
var D={drag:false,lx:0,ly:0};      // mouse drag
var T={active:false,d:0,cx:0,cy:0};// touch pinch
var data=null;
var rafId=0, dirty=false;
var mmDirty=false, mmRaf=0;
var ZMIN=0.12, ZMAX=3.5;
var LSVG='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

var world=document.getElementById('world');
var vp=document.getElementById('vp');
var bg=document.getElementById('bg');
var hzoom=document.getElementById('hzoom');

// ── RAF LOOP ─────────────────────────────────────────
function scheduleRender(){if(!dirty){dirty=true;rafId=requestAnimationFrame(applyT);}}

function applyT(){
  dirty=false;
  var t='translate('+V.tx.toFixed(2)+'px,'+V.ty.toFixed(2)+'px) scale('+V.sc.toFixed(4)+')';
  world.style.transform=t;
  var gs=Math.round(32*V.sc);
  var ox=((V.tx%gs)+gs)%gs, oy=((V.ty%gs)+gs)%gs;
  bg.style.backgroundSize=gs+'px '+gs+'px';
  bg.style.backgroundPosition=ox+'px '+oy+'px';
  hzoom.textContent=Math.round(V.sc*100)+'%';
  scheduleMM();
}

function scheduleMM(){if(!mmDirty){mmDirty=true;mmRaf=requestAnimationFrame(drawMM);}}

// ── ZOOM HELPERS ─────────────────────────────────────
function zAt(cx,cy,f){
  var ns=Math.min(ZMAX,Math.max(ZMIN,V.sc*f)),r=ns/V.sc;
  V.tx=cx-r*(cx-V.tx);V.ty=cy-r*(cy-V.ty);V.sc=ns;scheduleRender();
}
function resetView(){V.tx=0;V.ty=0;V.sc=1;scheduleRender();}
function zoomIn(){zAt(vp.offsetWidth/2,vp.offsetHeight/2,1.18);}
function zoomOut(){zAt(vp.offsetWidth/2,vp.offsetHeight/2,0.85);}

function fitAll(){
  if(!data)return;
  var x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  data.categories.forEach(function(c){
    var e=document.getElementById('n'+c.id);if(!e)return;
    x0=Math.min(x0,c.x);y0=Math.min(y0,c.y);
    x1=Math.max(x1,c.x+e.offsetWidth);y1=Math.max(y1,c.y+e.offsetHeight);
  });
  (data.notes||[]).forEach(function(n){
    var e=document.getElementById('sn'+n.id);if(!e)return;
    x0=Math.min(x0,n.x);y0=Math.min(y0,n.y);
    x1=Math.max(x1,n.x+e.offsetWidth);y1=Math.max(y1,n.y+e.offsetHeight);
  });
  if(x0===1e9)return;
  var pw=vp.offsetWidth-100,ph=vp.offsetHeight-100,bw=x1-x0||1,bh=y1-y0||1;
  V.sc=Math.min(ZMAX,Math.max(ZMIN,Math.min(pw/bw,ph/bh)))*0.88;
  V.tx=(pw-bw*V.sc)/2+50-x0*V.sc;V.ty=(ph-bh*V.sc)/2+50-y0*V.sc;
  scheduleRender();
}

// ── INPUT EVENTS ─────────────────────────────────────
vp.addEventListener('mousedown',function(e){
  if(e.target.closest('.cat-node,.sticky-note'))return;
  D.drag=true;D.lx=e.clientX;D.ly=e.clientY;vp.classList.add('grabbing');
});
window.addEventListener('mousemove',function(e){
  if(!D.drag)return;
  V.tx+=e.clientX-D.lx;V.ty+=e.clientY-D.ly;
  D.lx=e.clientX;D.ly=e.clientY;scheduleRender();
},{passive:true});
window.addEventListener('mouseup',function(){D.drag=false;vp.classList.remove('grabbing');});

vp.addEventListener('wheel',function(e){
  e.preventDefault();
  if(e.ctrlKey||Math.abs(e.deltaY)>30){
    zAt(e.clientX,e.clientY,e.deltaY<0?1.1:0.9);
  } else {
    V.tx-=e.deltaX*1.1;V.ty-=e.deltaY*1.1;scheduleRender();
  }
},{passive:false});

vp.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    e.preventDefault();
    T.active=true;
    T.d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    T.cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    T.cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
  }
},{passive:false});
vp.addEventListener('touchmove',function(e){
  if(!T.active||e.touches.length!==2)return;
  e.preventDefault();
  var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  var cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
  var cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
  zAt(cx,cy,d/T.d);
  V.tx+=cx-T.cx;V.ty+=cy-T.cy;
  T.d=d;T.cx=cx;T.cy=cy;scheduleRender();
},{passive:false});
vp.addEventListener('touchend',function(){T.active=false;});

// ── RENDER ───────────────────────────────────────────
function resolveImg(url){
  if(!url)return'';
  if(url.startsWith('http://')||url.startsWith('https://'))return url;
  var clean=url.replace(/^\//,'');
  if(location.hostname==='localhost'||location.hostname==='127.0.0.1')return'/'+clean;
  var base=location.pathname.split('/').slice(0,2).join('/');
  return base+'/'+clean;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildRefs(refs,cls){
  if(!refs||!refs.length)return'';
  return refs.filter(function(r){return r&&r.url;}).map(function(r){
    return'<a class="'+cls+' '+(r.color||'gray')+'" href="'+esc(r.url)+'" target="_blank" rel="noopener">'+LSVG+esc(r.label||r.url)+'</a>';
  }).join('');
}

function render(d){
  var frag=document.createDocumentFragment();
  var pub=0;

  d.categories.forEach(function(cat,ci){
    var pi=(cat.ideas||[]).filter(function(i){return i.visibility==='public';});
    pub+=pi.length;
    var n=document.createElement('div');
    n.className='cat-node';n.id='n'+cat.id;
    n.style.cssText='left:'+cat.x+'px;top:'+cat.y+'px;animation-delay:'+(ci*.06)+'s';

    var hdrHTML='<div class="nhdr"><div class="ndots"><span class="dr"></span><span class="dy"></span><span class="dg"></span></div><div class="ntitle">'+esc(cat.name)+'</div>'+(cat.status?'<div class="nstatus">'+esc(cat.status)+'</div>':'')+'</div>';

    var ideasHTML='<div class="nideas">';
    if(!pi.length){
      ideasHTML+='<div style="font-size:11px;color:var(--txd);padding:5px;font-family:var(--mono);opacity:.5">// no public ideas</div>';
    } else {
      pi.forEach(function(idea){
        var imgs=idea.images||[];
        var collage='';
        if(imgs.length){
          var show=imgs.slice(0,3);
          collage='<div class="icollage">'+show.map(function(u){return'<img src="'+esc(resolveImg(u))+'" loading="lazy" decoding="async">';}).join('')+'</div>';
        }
        var tags=(idea.tags||[]).map(function(t){return'<span class="itag">'+esc(t)+'</span>';}).join('');
        var links=(idea.links||[]).slice(0,2).map(function(l){return'<span class="ilp">'+esc(l.label||l.url)+'</span>';}).join('');
        var refs=buildRefs((idea.refs||[]).slice(0,3),'ref-btn');
        ideasHTML+=
          '<div class="icard" data-id="'+esc(idea.id)+'" data-cat="'+esc(cat.id)+'">'+
          collage+
          '<div class="iinfo"><div class="ititle">'+esc(idea.title)+'</div>'+
          (idea.description?'<div class="idesc">'+esc(idea.description)+'</div>':'')+
          (tags?'<div class="itags">'+tags+'</div>':'')+
          '</div>'+
          (links?'<div class="ilinks">'+links+'</div>':'')+
          (refs?'<div class="refs-row">'+refs+'</div>':'')+
          '</div>';
      });
    }
    ideasHTML+='</div>';

    var footHTML='<div class="nfoot"><span>'+pi.length+' idea'+(pi.length!==1?'s':'')+'</span><span style="color:var(--red)">'+esc(cat.id)+'</span></div>';

    n.innerHTML=hdrHTML+ideasHTML+footHTML;
    frag.appendChild(n);
  });

  (d.notes||[]).forEach(function(note,ni){
    var s=document.createElement('div');
    s.className='sticky-note '+(note.color||'yellow');
    s.id='sn'+note.id;
    s.style.cssText='left:'+note.x+'px;top:'+note.y+'px;'+(note.width?'width:'+note.width+'px':'')+';animation-delay:'+(ni*.05+.25)+'s';
    s.innerHTML=(note.title?'<div class="sntitle">'+esc(note.title)+'</div>':'')+'<div class="sncontent">'+esc(note.content||'')+'</div>';
    frag.appendChild(s);
  });

  world.innerHTML='';
  world.appendChild(frag);

  document.getElementById('hcount').textContent=pub+' idea'+(pub!==1?'s':'');
  document.getElementById('hsub').textContent=(d.settings&&d.settings.subtitle)||'A space for creative thoughts';
  document.title=(d.settings&&d.settings.title)||'Ideas Board';

  var repo=(d.settings&&d.settings.githubRepo)||'';
  var sel=document.getElementById('sub-cat');
  sel.innerHTML='<option value="">-- Select category --</option>';
  d.categories.forEach(function(cat){
    var o=document.createElement('option');o.value=cat.id;o.textContent=cat.name;sel.appendChild(o);
  });
  var hasRepo=/github\.com\/[^/]+\/[^/]+/.test(repo);
  document.getElementById('sub-btn').disabled=!hasRepo;
  document.getElementById('sub-note').textContent=hasRepo
    ?'Clicking Submit opens GitHub to complete your submission (free account required).'
    :'Submissions not configured. Contact the board admin.';

  scheduleRender();
  scheduleMM();
}

// Event delegation for idea cards
world.addEventListener('click',function(e){
  var ref=e.target.closest('.ref-btn,.ilp');
  if(ref)return; // let link open
  var card=e.target.closest('.icard');
  if(!card)return;
  var ideaId=card.dataset.id,catId=card.dataset.cat;
  if(!data||!ideaId)return;
  var cat=data.categories.find(function(c){return c.id===catId;});
  var idea=cat&&(cat.ideas||[]).find(function(i){return i.id===ideaId;});
  if(idea&&cat)openMod(idea,cat);
});

// ── MODAL ────────────────────────────────────────────
function openMod(idea,cat){
  var coll=document.getElementById('mcollage');
  coll.innerHTML='';coll.className='';
  var imgs=(idea.images||[]).slice(0,4);
  if(imgs.length){
    coll.style.display='';coll.className='c'+imgs.length;
    if(imgs.length===3){
      var f=new Image();f.src=resolveImg(imgs[0]);f.loading='lazy';coll.appendChild(f);
      var st=document.createElement('div');st.className='cst';
      [imgs[1],imgs[2]].forEach(function(u){var i=new Image();i.src=resolveImg(u);i.loading='lazy';st.appendChild(i);});
      coll.appendChild(st);
    } else {
      imgs.forEach(function(u){var i=new Image();i.src=resolveImg(u);i.loading='lazy';coll.appendChild(i);});
    }
  } else {coll.style.display='none';}

  document.getElementById('m-st').textContent=cat.status||cat.name;
  document.getElementById('m-ti').textContent=idea.title;
  document.getElementById('m-de').textContent=idea.description||'';
  document.getElementById('m-ta').innerHTML=(idea.tags||[]).map(function(t){return'<span class="mpill">'+esc(t)+'</span>';}).join('');

  var links=idea.links||[];
  var lw=document.getElementById('m-lw');
  lw.style.display=links.length?'':'none';
  if(links.length)document.getElementById('m-li').innerHTML=links.map(function(l){return'<a class="mlb" href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.label||l.url)+'</a>';}).join('');

  var refsHtml=buildRefs(idea.refs||[],'mref-btn');
  var rw=document.getElementById('m-rw');
  rw.style.display=refsHtml?'':'none';
  if(refsHtml)document.getElementById('m-ri').innerHTML=refsHtml;

  document.getElementById('m-ca').textContent='Category: '+cat.name;
  document.getElementById('modal-bg').classList.add('open');
}
function closeMod(e){
  if(e&&e.target!==document.getElementById('modal-bg')&&!e.target.classList.contains('mclose'))return;
  document.getElementById('modal-bg').classList.remove('open');
}

// ── SUBMIT ───────────────────────────────────────────
function openSub(){
  document.getElementById('sub-wrap').style.display='';
  document.getElementById('sub-ok').style.display='none';
  ['sub-title','sub-desc','sub-contact'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('sub-bg').classList.add('open');
}
function closeSub(e){
  if(e&&e.target!==document.getElementById('sub-bg')&&!e.target.classList.contains('sub-cl'))return;
  document.getElementById('sub-bg').classList.remove('open');
}
function submitIdea(){
  var title=document.getElementById('sub-title').value.trim();
  if(!title){document.getElementById('sub-title').focus();return;}
  var catId=document.getElementById('sub-cat').value;
  var desc=document.getElementById('sub-desc').value.trim();
  var contact=document.getElementById('sub-contact').value.trim();
  var repo=(data&&data.settings&&data.settings.githubRepo)||'';
  var m=repo.match(/github\.com\/([^/]+)\/([^/]+)/);
  if(!m)return;
  var catName='';
  if(data)data.categories.forEach(function(c){if(c.id===catId)catName=c.name;});
  var body=['**Category:** '+(catName||'Not specified'),'','**Description:**',desc||'(none)'];
  if(contact)body.push('','**Contact:** '+contact);
  var url='https://github.com/'+m[1]+'/'+m[2].replace(/\.git$/,'') +'/issues/new'
    +'?title='+encodeURIComponent('[Idea] '+title)
    +'&body='+encodeURIComponent(body.join('\n'))
    +'&labels='+encodeURIComponent('user-idea');
  window.open(url,'_blank','noopener');
  document.getElementById('sub-wrap').style.display='none';
  document.getElementById('sub-ok').style.display='block';
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    document.getElementById('modal-bg').classList.remove('open');
    document.getElementById('sub-bg').classList.remove('open');
  }
});

// ── MINIMAP ──────────────────────────────────────────
var mmCanvas=document.getElementById('mmcvs');
var mmCtx=mmCanvas.getContext('2d',{alpha:true});
function drawMM(){
  mmDirty=false;
  if(!data)return;
  mmCtx.clearRect(0,0,136,92);
  var all=[];
  data.categories.forEach(function(c){var e=document.getElementById('n'+c.id);if(!e)return;all.push({x:c.x,y:c.y,w:e.offsetWidth,h:e.offsetHeight,t:'cat'});});
  (data.notes||[]).forEach(function(n){var e=document.getElementById('sn'+n.id);if(!e)return;all.push({x:n.x,y:n.y,w:e.offsetWidth,h:e.offsetHeight,t:'note'});});
  if(!all.length)return;
  var x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  all.forEach(function(i){x0=Math.min(x0,i.x);y0=Math.min(y0,i.y);x1=Math.max(x1,i.x+i.w);y1=Math.max(y1,i.y+i.h);});
  var p=9,bw=(x1-x0)||1,bh=(y1-y0)||1,s=Math.min((136-p*2)/bw,(92-p*2)/bh);
  all.forEach(function(i){
    var x=p+(i.x-x0)*s,y=p+(i.y-y0)*s,w=i.w*s,h=i.h*s;
    mmCtx.fillStyle=i.t==='note'?'rgba(245,230,66,.45)':'#1a1e35';
    mmCtx.strokeStyle='#2a3260';mmCtx.lineWidth=.5;
    mmCtx.beginPath();if(mmCtx.roundRect)mmCtx.roundRect(x,y,w,h,2);else mmCtx.rect(x,y,w,h);
    mmCtx.fill();mmCtx.stroke();
  });
  mmCtx.strokeStyle='#e94560';mmCtx.lineWidth=1.2;
  mmCtx.strokeRect(p+(-V.tx/V.sc-x0)*s,p+(-V.ty/V.sc-y0)*s,(vp.offsetWidth/V.sc)*s,(vp.offsetHeight/V.sc)*s);
}

// ── LOAD ────────────────────────────────────────────
async function loadData(){
  var t=Date.now();
  var urls=['/data/ideas.json?t='+t,'data/ideas.json?t='+t,'/ideas.json?t='+t,'ideas.json?t='+t];
  for(var i=0;i<urls.length;i++){
    try{
      var r=await fetch(urls[i],{cache:'no-store'});
      if(!r.ok)continue;
      data=await r.json();
      render(data);
      requestAnimationFrame(function(){fitAll();document.getElementById('loading').classList.add('done');});
      return;
    }catch(e){}
  }
  document.getElementById('ltxt').textContent='Could not load ideas.json';
}
loadData();
