<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ideas Board</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f1a;--panel:#13162b;--panel2:#1a1e35;--accent:#0f3460;--active:#e94560;
  --text:#c8d0e7;--text-dim:#5a6490;--text-bright:#eef2ff;--border:#1e2544;--border-b:#2a3260;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--text);user-select:none}

#cbg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,#1e2544 1px,transparent 1px);background-size:32px 32px}
#vp{position:fixed;inset:0;z-index:1;overflow:hidden;cursor:grab}
#vp.grabbing{cursor:grabbing}
#world{position:absolute;top:0;left:0;width:0;height:0;transform-origin:0 0;will-change:transform}

/* NODE */
.cat-node{position:absolute;min-width:290px;max-width:350px;border-radius:14px;
  border:1px solid var(--border-b);background:var(--panel);
  box-shadow:0 0 30px rgba(14,52,96,.4),0 4px 24px rgba(0,0,0,.6);
  overflow:hidden;transition:border-color .2s,box-shadow .2s;
  animation:nIn .4s cubic-bezier(.16,1,.3,1) backwards}
.cat-node:hover{border-color:var(--active);
  box-shadow:0 0 30px rgba(14,52,96,.4),0 4px 24px rgba(0,0,0,.6),0 0 20px rgba(233,69,96,.3)}
@keyframes nIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:none}}
.nhdr{display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--panel2);border-bottom:1px solid var(--border)}
.ndots{display:flex;gap:5px;flex-shrink:0}
.ndots span{width:8px;height:8px;border-radius:50%}
.dr{background:#e94560}.dy{background:#f4c842}.dg{background:#3cc974}
.ntitle{font-size:13px;font-weight:600;color:var(--text-bright);font-family:var(--mono);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
.nstatus{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--active);
  color:#fff;white-space:nowrap;flex-shrink:0;font-family:var(--mono)}
.nideas{padding:10px;display:flex;flex-direction:column;gap:7px}

/* IDEA CARD */
.icard{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.icard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--active);opacity:0;transition:opacity .15s;border-radius:3px 0 0 3px}
.icard:hover{border-color:var(--border-b);background:#1e2444}
.icard:hover::before{opacity:1}

/* Image collage inside card */
.icollage{width:100%;overflow:hidden;border-radius:0;max-height:120px;display:flex;gap:2px;flex-shrink:0}
.icollage img{flex:1;object-fit:cover;min-width:0;height:120px;display:block;transition:transform .3s}
.icard:hover .icollage img{transform:scale(1.03)}
.icollage-1 img{height:120px}
.icollage-2 img{height:120px}
.icollage-3 img:first-child{flex:2}

.iinfo{padding:10px 12px 8px}
.ititle{font-size:12px;font-weight:500;color:var(--text-bright);font-family:var(--mono);margin-bottom:3px}
.idesc{font-size:11px;color:var(--text-dim);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.itags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.itag{font-size:9px;font-weight:600;padding:1px 7px;border-radius:10px;
  background:var(--accent);color:#7a9fd4;font-family:var(--mono);text-transform:uppercase}

/* Link pills preview on card */
.ilinks-preview{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 8px}
.ilink-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);
  padding:3px 9px;border-radius:20px;border:1px solid var(--border-b);
  color:var(--text-dim);background:var(--panel);text-decoration:none;
  transition:all .15s;white-space:nowrap}
.ilink-pill:hover{border-color:var(--active);color:var(--active);background:rgba(233,69,96,.08)}
.ilink-pill svg{width:9px;height:9px;flex-shrink:0;opacity:.6}

.nfoot{padding:6px 14px;border-top:1px solid var(--border);font-size:10px;
  color:var(--text-dim);font-family:var(--mono);display:flex;justify-content:space-between}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:12px;
  padding:10px 18px;background:rgba(13,15,26,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.hlogo{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--active);
  letter-spacing:.08em;display:flex;align-items:center;gap:6px}
.hpulse{width:7px;height:7px;border-radius:50%;background:var(--active);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hsep{width:1px;height:20px;background:var(--border-b)}
.hsp{flex:1}

#controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:6px;background:rgba(13,15,26,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border-b);border-radius:40px;padding:6px 10px}
.cbtn{background:var(--panel2);border:1px solid var(--border);border-radius:24px;
  color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 14px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.cbtn:hover{background:var(--accent);border-color:var(--active);color:#fff}
.cbtn svg{width:13px;height:13px;flex-shrink:0}

#minimap{position:fixed;bottom:70px;right:18px;z-index:100;width:160px;height:110px;
  background:rgba(13,15,26,.92);border:1px solid var(--border-b);border-radius:10px;overflow:hidden}
#mmlabel{position:absolute;top:5px;left:8px;font-size:9px;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase}

/* MODAL */
#modal-bg{position:fixed;inset:0;z-index:200;background:rgba(5,7,15,.75);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s}
#modal-bg.open{opacity:1;pointer-events:all}
#modal{background:var(--panel);border:1px solid var(--border-b);border-radius:18px;
  max-width:520px;width:92%;max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
  transform:translateY(24px) scale(.96);transition:transform .22s cubic-bezier(.16,1,.3,1);position:relative}
#modal::-webkit-scrollbar{width:4px}
#modal::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:2px}
#modal-bg.open #modal{transform:none}

/* Modal image collage */
#modal-collage{width:100%;display:flex;gap:3px;border-radius:18px 18px 0 0;overflow:hidden;max-height:240px}
#modal-collage img{flex:1;object-fit:cover;min-width:0;display:block}
#modal-collage:empty{display:none}
#modal-collage.c1 img{height:240px}
#modal-collage.c2 img{height:240px}
#modal-collage.c3 img:first-child{flex:2;height:240px}
#modal-collage.c3 .col-stack{display:flex;flex-direction:column;gap:3px;flex:1}
#modal-collage.c3 .col-stack img{flex:1;height:calc(120px - 1.5px);min-height:0}
#modal-collage.c4 .col-left{display:flex;flex-direction:column;gap:3px;flex:2}
#modal-collage.c4 .col-right{display:flex;flex-direction:column;gap:3px;flex:1}
#modal-collage.c4 img{flex:1;min-height:80px;height:calc((240px - 6px)/3)}

#modal-body{padding:24px 28px}
.m-status-chip{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;
  font-family:var(--mono);color:var(--active);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.m-status-chip::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--active);display:inline-block}
.m-title{font-size:22px;font-weight:600;color:var(--text-bright);margin-bottom:10px;line-height:1.25}
.m-desc{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:16px}
.m-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.m-tag-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;
  background:var(--accent);color:#7a9fd4;font-family:var(--mono);text-transform:uppercase}

/* Modal link buttons */
.m-links-title{font-size:10px;font-family:var(--mono);color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.m-links{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.m-link-btn{display:inline-flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:10px;
  border:1px solid var(--border-b);background:var(--panel2);
  color:var(--text-bright);font-family:var(--mono);font-size:12px;
  text-decoration:none;cursor:pointer;transition:all .18s;font-weight:500}
.m-link-btn:hover{border-color:var(--active);color:var(--active);
  background:rgba(233,69,96,.08);transform:translateY(-1px)}
.m-link-btn svg{width:12px;height:12px;flex-shrink:0;opacity:.7}
.m-cat{font-size:11px;color:var(--text-dim);font-family:var(--mono);
  border-top:1px solid var(--border);padding-top:14px;display:flex;align-items:center;gap:6px}

.mclose{position:absolute;top:14px;right:14px;z-index:10;background:rgba(13,15,26,.7);
  border:1px solid var(--border);border-radius:8px;color:var(--text-dim);
  width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;line-height:1;transition:all .15s;backdrop-filter:blur(4px)}
.mclose:hover{color:var(--active);border-color:var(--active)}

/* LOADING */
#loading{position:fixed;inset:0;z-index:300;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s}
#loading.done{opacity:0;pointer-events:none}
.llogo{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--active);letter-spacing:.12em}
.lbar{width:180px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.lfill{height:100%;background:var(--active);animation:lb 1.2s ease-out forwards}
@keyframes lb{from{width:0}to{width:100%}}
.ltxt{font-size:11px;color:var(--text-dim);font-family:var(--mono);text-align:center;line-height:1.6}
</style>
</head>
<body>

<div id="loading">
  <div class="llogo">IDEAS BOARD</div>
  <div class="lbar"><div class="lfill"></div></div>
  <div class="ltxt" id="ltxt">Loading ideas space…</div>
</div>

<div id="cbg"></div>

<div id="hud">
  <div class="hlogo"><span class="hpulse"></span>IDEAS BOARD</div>
  <div class="hsep"></div>
  <span style="font-size:12px;color:var(--text-dim);font-family:var(--mono)" id="hsub">A space for creative thoughts</span>
  <div class="hsp"></div>
  <span style="font-size:11px;color:var(--text-dim);font-family:var(--mono)" id="hcount">— ideas</span>
  <div class="hsep"></div>
  <span style="font-size:11px;color:var(--text-dim);font-family:var(--mono);min-width:48px;text-align:right" id="hzoom">100%</span>
</div>

<div id="vp"><div id="world"></div></div>

<div id="controls">
  <button class="cbtn" onclick="resetView()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 18 0"/><path d="M12 8v4l3 3"/></svg>Reset
  </button>
  <button class="cbtn" onclick="fitAll()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Fit all
  </button>
  <button class="cbtn" onclick="zoomIn()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>+
  </button>
  <button class="cbtn" onclick="zoomOut()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>−
  </button>
</div>

<div id="minimap">
  <div id="mmlabel">MAP</div>
  <canvas id="mmcvs" width="160" height="110"></canvas>
</div>

<div id="modal-bg" onclick="closeMod(event)">
  <div id="modal">
    <button class="mclose" onclick="closeMod()">×</button>
    <div id="modal-collage"></div>
    <div id="modal-body">
      <div class="m-status-chip" id="m-st"></div>
      <div class="m-title" id="m-ti"></div>
      <div class="m-desc" id="m-de"></div>
      <div class="m-tags" id="m-ta"></div>
      <div id="m-links-wrap" style="display:none">
        <div class="m-links-title">Links</div>
        <div class="m-links" id="m-li"></div>
      </div>
      <div class="m-cat" id="m-ca"></div>
    </div>
  </div>
</div>

<script>
const S={tx:0,ty:0,sc:1,drag:false,lx:0,ly:0,data:null};
const ZMIN=0.15,ZMAX=3;
const world=document.getElementById('world');
const vp=document.getElementById('vp');
const cbg=document.getElementById('cbg');

function applyT(a){
  world.style.transition=a?'transform .3s cubic-bezier(.16,1,.3,1)':'';
  world.style.transform=`translate(${S.tx}px,${S.ty}px) scale(${S.sc})`;
  cbg.style.backgroundSize=`${32*S.sc}px ${32*S.sc}px`;
  cbg.style.backgroundPosition=`${S.tx%(32*S.sc)}px ${S.ty%(32*S.sc)}px`;
  document.getElementById('hzoom').textContent=Math.round(S.sc*100)+'%';
  drawMM();
}
function zAt(cx,cy,f){
  const ns=Math.min(ZMAX,Math.max(ZMIN,S.sc*f)),r=ns/S.sc;
  S.tx=cx-r*(cx-S.tx);S.ty=cy-r*(cy-S.ty);S.sc=ns;applyT();
}
function resetView(){S.tx=0;S.ty=0;S.sc=1;applyT(true)}
function fitAll(){
  if(!S.data?.categories.length)return;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  S.data.categories.forEach(c=>{
    const e=document.getElementById('n'+c.id);if(!e)return;
    x0=Math.min(x0,c.x);y0=Math.min(y0,c.y);
    x1=Math.max(x1,c.x+e.offsetWidth);y1=Math.max(y1,c.y+e.offsetHeight);
  });
  const pw=vp.offsetWidth-120,ph=vp.offsetHeight-120,bw=x1-x0||1,bh=y1-y0||1;
  S.sc=Math.min(ZMAX,Math.max(ZMIN,Math.min(pw/bw,ph/bh)))*0.85;
  S.tx=(pw-bw*S.sc)/2+60-x0*S.sc;S.ty=(ph-bh*S.sc)/2+60-y0*S.sc;applyT(true);
}
function zoomIn(){zAt(vp.offsetWidth/2,vp.offsetHeight/2,1.2)}
function zoomOut(){zAt(vp.offsetWidth/2,vp.offsetHeight/2,0.83)}

vp.addEventListener('mousedown',e=>{if(e.target.closest('.cat-node'))return;S.drag=true;S.lx=e.clientX;S.ly=e.clientY;vp.classList.add('grabbing')});
window.addEventListener('mousemove',e=>{if(!S.drag)return;S.tx+=e.clientX-S.lx;S.ty+=e.clientY-S.ly;S.lx=e.clientX;S.ly=e.clientY;applyT()});
window.addEventListener('mouseup',()=>{S.drag=false;vp.classList.remove('grabbing')});
vp.addEventListener('wheel',e=>{e.preventDefault();
  if(e.ctrlKey||Math.abs(e.deltaY)>30)zAt(e.clientX,e.clientY,e.deltaY<0?1.12:0.88);
  else{S.tx-=e.deltaX*1.2;S.ty-=e.deltaY*1.2;applyT();}
},{passive:false});

let td=0,tcx=0,tcy=0;
vp.addEventListener('touchstart',e=>{if(e.touches.length!==2)return;
  td=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  tcx=(e.touches[0].clientX+e.touches[1].clientX)/2;tcy=(e.touches[0].clientY+e.touches[1].clientY)/2;
},{passive:true});
vp.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length!==2)return;
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
  zAt(cx,cy,d/td);S.tx+=cx-tcx;S.ty+=cy-tcy;td=d;tcx=cx;tcy=cy;applyT();
},{passive:false});

// Build image collage HTML for a card (max 3 shown)
function buildCardCollage(images){
  if(!images||!images.length) return '';
  const imgs=images.slice(0,3);
  return `<div class="icollage icollage-${imgs.length}">
    ${imgs.map(u=>`<img src="${esc(u)}" loading="lazy" onerror="this.parentElement.remove()">`).join('')}
  </div>`;
}

// Build link pills for card preview (max 2 shown)
function buildCardLinks(links){
  if(!links||!links.length) return '';
  const show=links.slice(0,2);
  const more=links.length>2?`<span class="ilink-pill">+${links.length-2} more</span>`:'';
  return `<div class="ilinks-preview">
    ${show.map(l=>`<span class="ilink-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      ${esc(l.label||l.url)}
    </span>`).join('')}${more}
  </div>`;
}

function render(data){
  world.innerHTML='';
  let pub=0;
  data.categories.forEach((cat,ci)=>{
    const pi=(cat.ideas||[]).filter(i=>i.visibility==='public');pub+=pi.length;
    const n=document.createElement('div');
    n.className='cat-node';n.id='n'+cat.id;
    n.style.left=cat.x+'px';n.style.top=cat.y+'px';n.style.animationDelay=(ci*.07)+'s';

    const hdr=document.createElement('div');hdr.className='nhdr';
    hdr.innerHTML=`<div class="ndots"><span class="dr"></span><span class="dy"></span><span class="dg"></span></div>
      <div class="ntitle">${esc(cat.name)}</div>${cat.status?`<div class="nstatus">${esc(cat.status)}</div>`:''}`;
    n.appendChild(hdr);

    const body=document.createElement('div');body.className='nideas';
    if(!pi.length){
      body.innerHTML='<div style="font-size:11px;color:var(--text-dim);padding:6px 4px;font-family:var(--mono);opacity:.5">// no public ideas</div>';
    } else {
      pi.forEach(idea=>{
        const c=document.createElement('div');c.className='icard';
        const collage=buildCardCollage(idea.images);
        const tags=(idea.tags||[]).map(t=>`<span class="itag">${esc(t)}</span>`).join('');
        const linkPills=buildCardLinks(idea.links);
        c.innerHTML=`${collage}
          <div class="iinfo">
            <div class="ititle">${esc(idea.title)}</div>
            <div class="idesc">${esc(idea.description||'')}</div>
            ${tags?`<div class="itags">${tags}</div>`:''}
          </div>
          ${linkPills}`;
        // Stop link pill clicks from opening modal
        c.querySelectorAll('.ilink-pill').forEach(el=>el.addEventListener('click',e=>e.stopPropagation()));
        c.onclick=e=>{if(!e.target.closest('.ilink-pill'))openMod(idea,cat)};
        body.appendChild(c);
      });
    }
    n.appendChild(body);

    const foot=document.createElement('div');foot.className='nfoot';
    foot.innerHTML=`<span>${pi.length} idea${pi.length!==1?'s':''}</span><span style="color:var(--active)">${esc(cat.id)}</span>`;
    n.appendChild(foot);
    world.appendChild(n);
  });
  document.getElementById('hcount').textContent=pub+' idea'+(pub!==1?'s':'');
  document.getElementById('hsub').textContent=data.settings?.subtitle||'A space for creative thoughts';
  document.title=data.settings?.title||'Ideas Board';
  drawMM();
}

// Build modal collage (up to 4 images in a grid)
function buildModalCollage(images){
  const el=document.getElementById('modal-collage');
  el.innerHTML='';el.className='';
  if(!images||!images.length){el.style.display='none';return;}
  el.style.display='';
  const imgs=images.slice(0,4);
  const n=imgs.length;
  el.className='c'+n;
  if(n<=2){
    imgs.forEach(u=>{const i=new Image();i.src=u;i.loading='lazy';i.onerror=()=>i.remove();el.appendChild(i);});
  } else if(n===3){
    const [a,b,c]=imgs;
    const i=new Image();i.src=a;i.loading='lazy';i.onerror=()=>i.remove();el.appendChild(i);
    const stack=document.createElement('div');stack.className='col-stack';
    [b,c].forEach(u=>{const i=new Image();i.src=u;i.loading='lazy';i.onerror=()=>i.remove();stack.appendChild(i);});
    el.appendChild(stack);
  } else {
    const left=document.createElement('div');left.className='col-left';
    const right=document.createElement('div');right.className='col-right';
    imgs.slice(0,2).forEach(u=>{const i=new Image();i.src=u;i.loading='lazy';i.onerror=()=>i.remove();left.appendChild(i);});
    imgs.slice(2,4).forEach(u=>{const i=new Image();i.src=u;i.loading='lazy';i.onerror=()=>i.remove();right.appendChild(i);});
    el.appendChild(left);el.appendChild(right);
  }
}

function openMod(idea,cat){
  buildModalCollage(idea.images);
  document.getElementById('m-st').textContent=cat.status||cat.name;
  document.getElementById('m-ti').textContent=idea.title;
  document.getElementById('m-de').textContent=idea.description||'—';
  document.getElementById('m-ta').innerHTML=(idea.tags||[]).map(t=>`<span class="m-tag-pill">${esc(t)}</span>`).join('');

  const links=idea.links||[];
  const wrap=document.getElementById('m-links-wrap');
  const linksEl=document.getElementById('m-li');
  if(links.length){
    wrap.style.display='';
    linksEl.innerHTML=links.map(l=>`
      <a class="m-link-btn" href="${esc(l.url)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        ${esc(l.label||l.url)}
      </a>`).join('');
  } else { wrap.style.display='none'; }

  document.getElementById('m-ca').innerHTML=`
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Category: <strong style="color:var(--text-bright);margin-left:4px">${esc(cat.name)}</strong>`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeMod(e){
  if(e&&e.target!==document.getElementById('modal-bg')&&!e.target.classList.contains('mclose'))return;
  document.getElementById('modal-bg').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal-bg').classList.remove('open')});

function drawMM(){
  const c=document.getElementById('mmcvs'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,160,110);
  if(!S.data?.categories.length)return;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  S.data.categories.forEach(c=>{const e=document.getElementById('n'+c.id);if(!e)return;
    x0=Math.min(x0,c.x);y0=Math.min(y0,c.y);x1=Math.max(x1,c.x+e.offsetWidth);y1=Math.max(y1,c.y+e.offsetHeight);});
  const p=12,bw=(x1-x0)||1,bh=(y1-y0)||1,s=Math.min((160-p*2)/bw,(110-p*2)/bh);
  S.data.categories.forEach(cat=>{const e=document.getElementById('n'+cat.id);if(!e)return;
    const x=p+(cat.x-x0)*s,y=p+(cat.y-y0)*s,w=e.offsetWidth*s,h=e.offsetHeight*s;
    ctx.fillStyle='#1a1e35';ctx.strokeStyle='#2a3260';ctx.lineWidth=.5;
    ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();ctx.stroke();});
  ctx.strokeStyle='#e94560';ctx.lineWidth=1;
  ctx.strokeRect(p+(-S.tx/S.sc-x0)*s,p+(-S.ty/S.sc-y0)*s,(vp.offsetWidth/S.sc)*s,(vp.offsetHeight/S.sc)*s);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function loadData(){
  const local=location.hostname==='localhost'||location.hostname==='127.0.0.1';
  const urls=local?['/data/ideas.json?t='+Date.now(),'data/ideas.json?t='+Date.now()]:['data/ideas.json?t='+Date.now()];
  for(const url of urls){
    try{
      const r=await fetch(url);if(!r.ok)continue;
      const data=await r.json();S.data=data;render(data);
      setTimeout(()=>{fitAll();document.getElementById('loading').classList.add('done');},900);
      return;
    }catch{}
  }
  document.getElementById('ltxt').innerHTML='Load error. Open via:<br><a href="http://localhost:3001/site" style="color:#e94560">localhost:3001/site</a>';
}
loadData();
